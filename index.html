function genHistory(base) {
  const c=[]; let price=base*0.85;
  for(let i=0;i<90;i++){
    const ch=(Math.random()-0.48)*price*0.025;
    const open=price, close=Math.max(price+ch,1);
    c.push({open,close,high:Math.max(open,close)*(1+Math.random()*.012),low:Math.min(open,close)*(1-Math.random()*.012),vol:Math.random()*5000+500});
    price=close;
  }
  return c;
}

// ── CANDLE CHART ──────────────────────────────────────────────────────────
function CandleChart({candles,color,height=160}){
  const W=900,H=height,visible=candles.slice(-60);
  const prices=visible.flatMap(c=>[c.high,c.low]);
  const minP=Math.min(...prices),maxP=Math.max(...prices);
  const scaleY=v=>H-((v-minP)/(maxP-minP+0.001))*(H-10)-5;
  const cw=W/visible.length;
  const gradId=`g${color.replace(/[^a-z0-9]/gi,'')}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height}} preserveAspectRatio="none">
      <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity={0.22}/><stop offset="100%" stopColor={color} stopOpacity={0}/></linearGradient></defs>
      {[0.25,0.5,0.75].map(t=><line key={t} x1={0} x2={W} y1={H*t} y2={H*t} stroke={G.border} strokeWidth={0.6} strokeDasharray="3,6"/>)}
      <path d={[`M ${cw*.5} ${scaleY(visible[0].close)}`,...visible.map((c,i)=>`L ${cw*i+cw*.5} ${scaleY(c.close)}`),`L ${cw*(visible.length-.5)} ${H}`,`L ${cw*.5} ${H}`,"Z"].join(" ")} fill={`url(#${gradId})`}/>
      {visible.map((c,i)=>{
        const up=c.close>=c.open,col=up?G.green2:G.red;
        const y1=scaleY(Math.max(c.open,c.close)),y2=scaleY(Math.min(c.open,c.close));
        return(<g key={i}><line x1={cw*i+cw/2} x2={cw*i+cw/2} y1={scaleY(c.high)} y2={scaleY(c.low)} stroke={col} strokeWidth={0.9}/><rect x={cw*i+cw*.15} y={y1} width={cw*.7} height={Math.max(y2-y1,1)} fill={col} rx={1}/></g>);
      })}
      {(()=>{const lp=scaleY(visible[visible.length-1].close);return <line x1={0} x2={W} y1={lp} y2={lp} stroke={color} strokeWidth={1} strokeDasharray="5,5" opacity={0.7}/>;})()}
    </svg>
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | register
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const handleSubmit = async () => {
    setError(""); setLoading(true);
    try {
      if(mode==="register"){
        if(!name.trim()) throw new Error("Ingresá tu nombre");
        const cred = await auth.createUserWithEmailAndPassword(email,pass);
        await cred.user.updateProfile({displayName:name.trim()});
        // crear doc en Firestore con balance inicial
        await db.collection("users").doc(cred.user.uid).set({
          name:name.trim(), email,
          balance:INITIAL_BALANCE,
          txHistory:[],
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        onAuth(cred.user);
      } else {
        const cred = await auth.signInWithEmailAndPassword(email,pass);
        onAuth(cred.user);
      }
    } catch(e){
      const msgs = {
        "auth/email-already-in-use":"Este email ya está registrado.",
        "auth/invalid-email":"Email inválido.",
        "auth/weak-password":"La contraseña debe tener al menos 6 caracteres.",
        "auth/user-not-found":"Usuario no encontrado.",
        "auth/wrong-password":"Contraseña incorrecta.",
        "auth/invalid-credential":"Email o contraseña incorrectos.",
      };
      setError(msgs[e.code] || e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
      <BgPattern/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:420,padding:"0 20px"}}>

          <div style={{fontSize:52,marginBottom:8}}>🐄</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:700,fontStyle:"italic",color:G.cream,lineHeight:1}}>PampaToken</div>
          <div style={{fontSize:10,color:G.textDim,letterSpacing:3,textTransform:"uppercase",marginTop:6}}>Ganadería Digital · Argentina</div>
        </div>

        {/* card */}
        <div style={{background:G.bgCard,border:`1px solid ${G.border}`,borderRadius:12,padding:"32px 28px"}}>
          {/* tabs */}
          <div style={{display:"flex",gap:0,marginBottom:28,borderBottom:`1px solid ${G.border}`}}>
            {[["login","Ingresar"],["register","Crear cuenta"]].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setError("");}}
                style={{flex:1,padding:"10px",background:"transparent",border:"none",borderBottom:`2px solid ${mode===m?G.green2:"transparent"}`,color:mode===m?G.green2:G.creamDark,fontWeight:700,fontSize:13,letterSpacing:1,textTransform:"uppercase",transition:"all .18s",cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>

          {mode==="register" && (
            <>
              <label style={S.label}>Nombre</label>
              <input style={S.input} type="text" placeholder="Juan Pérez" value={name} onChange={e=>setName(e.target.value)}/>
            </>
          )}
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" placeholder="juan@campo.com" value={email} onChange={e=>setEmail(e.target.value)}/>
          <label style={S.label}>Contraseña</label>
          <input style={S.input} type="password" placeholder={mode==="register"?"Mínimo 6 caracteres":"••••••••"} value={pass} onChange={e=>setPass(e.target.value)}/>

          {error && (

    if(!authUser) return;
    setSaving(true);
    try {
      await db.collection("users").doc(authUser.uid).update({
        balance: newBalance,
        txHistory: newTx,
      });
      setUserData(prev=>({...prev,balance:newBalance,txHistory:newTx}));
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  const handleBuy = async () => {
    const qty=parseFloat(buyQty);
    if(!qty||qty<=0) return showToast("⚠️ Ingresá una cantidad válida");
    const total=qty*prices[selectedToken];
    const bal = userData.balance;
    if(total>bal.USD) return showToast("⚠️ Saldo USD insuficiente");
    const newBal={...bal,USD:+(bal.USD-total).toFixed(2),[selectedToken]:+(bal[selectedToken]+qty).toFixed(4)};
    const newTx=[{type:"BUY",token:selectedToken,qty,price:prices[selectedToken],total:+total.toFixed(2),ts:new Date().toLocaleTimeString()},...(userData.txHistory||[]).slice(0,49)];
    setBuyQty("");
    await saveToCloud(newBal,newTx);
    showToast(`✅ Compraste ${qty} ${selectedToken} @ $${prices[selectedToken].toFixed(2)}`);
  };

  const handleSell = async () => {
    const qty=parseFloat(sellQty);
    if(!qty||qty<=0) return showToast("⚠️ Ingresá una cantidad válida");
    const bal=userData.balance;
    if(qty>bal[selectedToken]) return showToast("⚠️ Tokens insuficientes");
    const total=qty*prices[selectedToken];
    const newBal={...bal,USD:+(bal.USD+total).toFixed(2),[selectedToken]:+(bal[selectedToken]-qty).toFixed(4)};
    const newTx=[{type:"SELL",token:selectedToken,qty,price:prices[selectedToken],total:+total.toFixed(2),ts:new Date().toLocaleTimeString()},...(userData.txHistory||[]).slice(0,49)];
    setSellQty("");
    await saveToCloud(newBal,newTx);
    showToast(`✅ Vendiste ${qty} ${selectedToken} @ $${prices[selectedToken].toFixed(2)}`);
  };

  const handlePublishOrder = () => {
    const price=parseFloat(p2pPrice),qty=parseFloat(p2pQty);
    if(!price||!qty) return showToast("⚠️ Completá precio y cantidad");
    const newOrder={id:`my-${Date.now()}`,user:`${userData.name} 🟢`,price,qty,payment:p2pPayment};
    setP2pOrders(prev=>({...prev,[p2pToken]:{buys:p2pSide==="buy"?[newOrder,...prev[p2pToken].buys]:prev[p2pToken].buys,sells:p2pSide==="sell"?[newOrder,...prev[p2pToken].sells]:prev[p2pToken].sells}}));
    setP2pPrice("");setP2pQty("");
    showToast(`✅ Orden publicada: ${p2pSide.toUpperCase()} ${qty} ${p2pToken} @ $${price}`);
  };

  const handleLogout = async () => { await auth.signOut(); };

  // ── LOADING ───────────────────────────────────────────────────────────
  if(authUser === undefined){
    return(
      <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>🐄</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:G.cream,fontStyle:"italic"}}>Cargando PampaToken...</div>
        </div>
      </div>
    );
  }

  // ── AUTH SCREEN ───────────────────────────────────────────────────────
  if(!authUser) return <AuthScreen onAuth={setAuthUser}/>;
  if(!userData) return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:G.cream}}>Cargando tu portfolio...</div>
    </div>
  );

  const token=TOKENS[selectedToken],price=prices[selectedToken],change=changes[selectedToken],candles=histories[selectedToken];
  const bal=userData.balance||INITIAL_BALANCE;
  const txHistory=userData.txHistory||[];
  const portfolioUSD=bal.USD+Object.keys(TOKENS).reduce((a,t)=>a+bal[t]*prices[t],0);

  return(
    <div style={S.app}>
      <BgPattern/>

      {/* NAV */}
      <nav style={S.nav}>
        <div style={S.navLogo}>
          <span style={{fontSize:32}}>🐄</span>
          <div>PampaToken<span style={S.navLogoSub}>Ganadería Digital · Argentina</span></div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["market","📈 Mercado"],["p2p","🤝 P2P"],["portfolio","💼 Portfolio"]].map(([p,l])=>(
            <button key={p} style={S.navLink(page===p)} onClick={()=>setPage(p)}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:12,color:G.creamDim}}>
            💵 <strong style={{color:G.cream}}>${bal.USD.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>
          </span>
          <span style={{fontSize:11,color:G.textDim}}>👤 {userData.name}</span>
          {saving && <span style={{fontSize:10,color:G.gold,letterSpacing:1}}>guardando...</span>}
          <button onClick={handleLogout} style={{padding:"5px 12px",background:"transparent",border:`1px solid ${G.border}`,borderRadius:4,color:G.creamDark,fontSize:11,letterSpacing:1,textTransform:"uppercase",cursor:"pointer"}}>Salir</button>
          <span style={S.navBadge}>Testnet</span>
        </div>
      </nav>

      {/* ── MARKET ── */}
      {page==="market" && (
        <div style={S.page}>
          <h1 style={S.pageTitle}>Mercado de <em style={{color:G.green3}}>Tokens</em></h1>
          <p style={S.subtitle}>Hacienda tokenizada · Precios en tiempo real · Simulación testnet</p>
          <div style={S.divider}/>

          <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap"}}>
            {Object.values(TOKENS).map(tk=>(
              <div key={tk.ticker} style={S.tickerCard(selectedToken===tk.ticker,tk.color)} onClick={()=>setSelected(tk.ticker)}>
                <div style={{position:"absolute",right:-8,bottom:-8,opacity:0.06}}><CowSVG size={70} opacity={1}/></div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:900,letterSpacing:2,color:tk.color,textTransform:"uppercase"}}>{tk.ticker}</span>
                  <span style={{fontSize:18}}>{tk.icon}</span>
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:G.cream,marginBottom:2}}>${prices[tk.ticker].toFixed(2)}</div>
                <div style={{fontSize:11,fontWeight:700,color:changes[tk.ticker]>=0?G.green3:G.redLight,marginBottom:6}}>{changes[tk.ticker]>=0?"▲":"▼"} {Math.abs(changes[tk.ticker])}%</div>
                <div style={{fontSize:10,color:G.creamDark,lineHeight:1.4}}>{tk.desc}</div>
              </div>
            ))}
          </div>

          <div style={{...S.card,padding:"22px 24px 14px",marginBottom:22}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:G.cream,fontStyle:"italic"}}>{token.name} <span style={{color:G.textDim,fontWeight:400,fontSize:15}}>/ USD</span></div>
                <div style={{fontSize:9,color:G.textDim,letterSpacing:2,textTransform:"uppercase",marginTop:3}}>Velas 4h · Últimas 60 sesiones</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:700,color:token.color,lineHeight:1}}>${price.toFixed(2)}</div>
                <div style={{fontSize:11,color:G.textDim,marginTop:4}}>≈ ARS ${(price*ARS_RATE).toLocaleString("es-AR",{maximumFractionDigits:0})}</div>
                <div style={{fontSize:11,fontWeight:700,marginTop:2,color:change>=0?G.green3:G.redLight}}>{change>=0?"▲":"▼"} {Math.abs(change)}% vs. precio base</div>
              </div>
            </div>
            <CandleChart candles={candles} color={token.color} height={190}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
            <div style={{...S.card,padding:22,borderColor:`${G.green1}44`}}>
              <div style={{fontSize:11,fontWeight:900,letterSpacing:2,color:G.green3,marginBottom:18,textTransform:"uppercase"}}>▲ Comprar {selectedToken}</div>
              <label style={S.label}>Cantidad</label>
              <input style={S.input} type="number" placeholder="0.00" value={buyQty} onChange={e=>setBuyQty(e.target.value)}/>
              <label style={S.label}>Precio market</label>
              <input style={{...S.input,color:G.textDim,cursor:"default"}} readOnly value={`$${price.toFixed(2)} USD`}/>
              <div style={{fontSize:11,color:G.creamDark,marginBottom:16,padding:"10px 12px",background:G.bgPanel,borderRadius:5,borderLeft:`2px solid ${G.green1}`}}>
                Total: <strong style={{color:G.cream}}>${buyQty?((parseFloat(buyQty)||0)*price).toFixed(2):"—"}</strong>
                <span style={{color:G.textDim}}> · Saldo: ${bal.USD.toFixed(2)}</span>
              </div>
              <button style={S.btnBuy} onClick={handleBuy}>Comprar {selectedToken}</button>
            </div>
            <div style={{...S.card,padding:22,borderColor:`${G.red}33`}}>
              <div style={{fontSize:11,fontWeight:900,letterSpacing:2,color:G.redLight,marginBottom:18,textTransform:"uppercase"}}>▼ Vender {selectedToken}</div>
              <label style={S.label}>Cantidad</label>
              <input style={S.input} type="number" placeholder="0.00" value={sellQty} onChange={e=>setSellQty(e.target.value)}/>
              <label style={S.label}>Precio market</label>
              <input style={{...S.input,color:G.textDim,cursor:"default"}} readOnly value={`$${price.toFixed(2)} USD`}/>
              <div style={{fontSize:11,color:G.creamDark,marginBottom:16,padding:"10px 12px",background:G.bgPanel,borderRadius:5,borderLeft:`2px solid ${G.red}`}}>
                Total: <strong style={{color:G.cream}}>${sellQty?((parseFloat(sellQty)||0)*price).toFixed(2):"—"}</strong>
                <span style={{color:G.textDim}}> · Tenés: {bal[selectedToken]} {selectedToken}</span>
              </div>
              <button style={S.btnSell} onClick={handleSell}>Vender {selectedToken}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── P2P ── */}
      {page==="p2p" && (
        <div style={S.page}>
          <h1 style={S.pageTitle}>Mercado <em style={{color:G.green3}}>P2P</em></h1>
          <p style={S.subtitle}>Operá directamente con productores e inversores · Publicá tus órdenes</p>
          <div style={S.divider}/>
          <div style={{display:"flex",gap:10,marginBottom:24,alignItems:"center",flexWrap:"wrap"}}>
            {Object.values(TOKENS).map(tk=>(
              <button key={tk.ticker} onClick={()=>setP2pToken(tk.ticker)}
                style={{padding:"8px 22px",borderRadius:5,fontSize:12,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",transition:"all .18s",background:p2pToken===tk.ticker?`${tk.color}25`:"transparent",border:`1px solid ${p2pToken===tk.ticker?tk.color:G.border}`,color:p2pToken===tk.ticker?tk.color:G.creamDark}}>
                {tk.icon} {tk.ticker}
              </button>
            ))}
            <div style={{marginLeft:"auto",fontSize:11,color:G.textDim}}>
              Spread: <strong style={{color:G.gold,fontSize:13}}>{p2pOrders[p2pToken].sells[0]&&p2pOrders[p2pToken].buys[0]?`$${(p2pOrders[p2pToken].sells[0].price-p2pOrders[p2pToken].buys[0].price).toFixed(2)}`:"—"}</strong>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div>
              <div style={{...S.card,padding:"18px 20px",marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:900,letterSpacing:2,color:G.redLight,marginBottom:12,textTransform:"uppercase"}}>▼ Vendedores · {p2pToken}</div>
                <div style={S.obHead}><span>Usuario</span><span>Precio</span><span>Cant.</span><span>Método</span></div>
                {p2pOrders[p2pToken].sells.slice(0,7).map(o=>(
                  <div key={o.id} style={S.obRow}>
                    <span style={{color:G.textDim,fontSize:11}}>{o.user}</span>
                    <span style={{color:G.redLight,fontWeight:700}}>${o.price.toFixed(2)}</span>
                    <span style={{color:G.cream}}>{o.qty}</span>
                    <span style={{fontSize:10,color:G.creamDark}}>{o.payment}</span>
                  </div>
                ))}
              </div>
              <div style={{...S.card,padding:"18px 20px"}}>
                <div style={{fontSize:11,fontWeight:900,letterSpacing:2,color:G.green3,marginBottom:12,textTransform:"uppercase"}}>▲ Compradores · {p2pToken}</div>
                <div style={S.obHead}><span>Usuario</span><span>Precio</span><span>Cant.</span><span>Método</span></div>
                {p2pOrders[p2pToken].buys.slice(0,7).map(o=>(
                  <div key={o.id} style={S.obRow}>
                    <span style={{color:G.textDim,fontSize:11}}>{o.user}</span>
                    <span style={{color:G.green3,fontWeight:700}}>${o.price.toFixed(2)}</span>
                    <span style={{color:G.cream}}>{o.qty}</span>
                    <span style={{fontSize:10,color:G.creamDark}}>{o.payment}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{...S.card,padding:"22px 24px"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,fontStyle:"italic",color:G.cream,marginBottom:18}}>Publicar Orden P2P</div>
              <div style={{display:"flex",gap:8,marginBottom:18}}>
                {["buy","sell"].map(side=>(
                  <button key={side} onClick={()=>setP2pSide(side)}
                    style={{flex:1,padding:"10px",borderRadius:5,fontWeight:700,fontSize:12,letterSpacing:1.5,textTransform:"uppercase",transition:"all .18s",border:`1px solid ${p2pSide===side?(side==="buy"?G.green1:G.red):G.border}`,background:p2pSide===side?(side==="buy"?`${G.green1}25`:`${G.red}25`):"transparent",color:p2pSide===side?(side==="buy"?G.green3:G.redLight):G.creamDark}}>
                    {side==="buy"?"▲ Comprar":"▼ Vender"}
                  </button>
                ))}
              </div>
              <label style={S.label}>Token</label>
              <select style={S.select} value={p2pToken} onChange={e=>setP2pToken(e.target.value)}>
                {Object.values(TOKENS).map(tk=><option key={tk.ticker} value={tk.ticker}>{tk.icon} {tk.name} ({tk.ticker})</option>)}
              </select>
              <label style={S.label}>Precio (USD)</label>
              <input style={S.input} type="number" placeholder={`~${prices[p2pToken].toFixed(2)}`} value={p2pPrice} onChange={e=>setP2pPrice(e.target.value)}/>
              <label style={S.label}>Cantidad</label>
              <input style={S.input} type="number" placeholder="0" value={p2pQty} onChange={e=>setP2pQty(e.target.value)}/>
              <label style={S.label}>Método de pago</label>
              <select style={S.select} value={p2pPayment} onChange={e=>setP2pPayment(e.target.value)}>
                {["Transferencia","Wise","USDT","Efectivo","Crypto"].map(m=><option key={m}>{m}</option>)}
              </select>
              {p2pPrice&&p2pQty&&(
                <div style={{fontSize:11,color:G.creamDark,marginBottom:14,padding:"12px 14px",background:G.bgPanel,borderRadius:5,borderLeft:`2px solid ${G.gold}`}}>
                  Total: <strong style={{color:G.cream}}>${(parseFloat(p2pPrice)*parseFloat(p2pQty)).toFixed(2)}</strong><br/>
                  ≈ ARS ${((parseFloat(p2pPrice)*parseFloat(p2pQty))*ARS_RATE).toLocaleString("es-AR",{maximumFractionDigits:0})}
                </div>
              )}
              <button style={p2pSide==="buy"?S.btnBuy:S.btnSell} onClick={handlePublishOrder}>Publicar Orden</button>
              <div style={{fontSize:9,color:G.textDim,marginTop:10,textAlign:"center",letterSpacing:1}}>Las órdenes son visibles para todos los participantes</div>
            </div>
          </div>
        </div>
      )}

      {/* ── PORTFOLIO ── */}
      {page==="portfolio" && (
        <div style={S.page}>
          <h1 style={S.pageTitle}>Mi <em style={{color:G.green3}}>Portfolio</em></h1>
          <p style={S.subtitle}>Posición actual · {userData.name} · Testnet PampaToken</p>
          <div style={S.divider}/>

          <div style={{...S.card,padding:"28px 32px",marginBottom:24,background:`linear-gradient(135deg, ${G.bgLight}, ${G.bgCard})`,borderColor:G.borderLight,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-20,top:-20,opacity:0.04}}><CowSVG size={140} opacity={1}/></div>
            <div style={{fontSize:9,color:G.textDim,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Valor Total del Portfolio</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:52,fontWeight:700,color:G.cream,lineHeight:1}}>${portfolioUSD.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            <div style={{fontSize:12,color:G.textDim,marginTop:8}}>≈ ARS ${(portfolioUSD*ARS_RATE).toLocaleString("es-AR",{maximumFractionDigits:0})}</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16,marginBottom:28}}>
            <div style={{...S.card,padding:"20px 22px",borderTop:`3px solid ${G.cream}`}}>
              <div style={{fontSize:9,color:G.textDim,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💵 Saldo Cash</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:G.cream}}>${bal.USD.toFixed(2)}</div>
              <div style={{fontSize:11,color:G.textDim,marginTop:4}}>≈ ARS ${(bal.USD*ARS_RATE).toLocaleString("es-AR",{maximumFractionDigits:0})}</div>
            </div>
            {Object.values(TOKENS).map(tk=>(
              <div key={tk.ticker} style={{...S.card,padding:"20px 22px",borderTop:`3px solid ${tk.color}`,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",right:-5,bottom:-5,opacity:0.05}}><CowSVG size={60} opacity={1}/></div>
                <div style={{fontSize:9,color:G.textDim,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>{tk.icon} {tk.ticker}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:G.cream}}>{bal[tk.ticker].toLocaleString()}</div>
                <div style={{fontSize:11,color:G.textDim,marginBottom:8}}>{tk.name}</div>
                <div style={{fontSize:18,fontWeight:700,color:tk.color}}>${(bal[tk.ticker]*prices[tk.ticker]).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                <div style={{fontSize:10,color:G.creamDark,marginTop:2}}>@ ${prices[tk.ticker].toFixed(2)} / token</div>
              </div>
            ))}
          </div>

          <div style={{marginBottom:28}}>
            <div style={{fontSize:10,color:G.textDim,letterSpacing:2,textTransform:"uppercase",marginBottom:14,fontWeight:700}}>Evolución de Precios</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
              {Object.values(TOKENS).map(tk=>(
                <div key={tk.ticker} style={{...S.card,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:tk.color,letterSpacing:1}}>{tk.icon} {tk.ticker}</span>
                    <span style={{fontSize:12,color:G.cream}}>${prices[tk.ticker].toFixed(2)}</span>
                  </div>
                  <CandleChart candles={histories[tk.ticker]} color={tk.color} height={80}/>
                </div>
              ))}
            </div>
          </div>

          {txHistory.length>0?(
            <div>
              <div style={{fontSize:10,color:G.textDim,letterSpacing:2,textTransform:"uppercase",marginBottom:12,fontWeight:700}}>Historial de Transacciones</div>
              <div style={{...S.card,overflow:"hidden"}}>
                <div style={S.txHead}><span>Hora</span><span>Tipo</span><span>Token</span><span>Precio</span><span>Total USD</span></div>
                {txHistory.map((tx,i)=>(
                  <div key={i} style={S.txRow}>
                    <span style={{color:G.textDim}}>{tx.ts}</span>
                    <span style={{color:tx.type==="BUY"?G.green3:G.redLight,fontWeight:700,fontSize:11,letterSpacing:1}}>{tx.type}</span>
                    <span style={{color:G.cream}}>{tx.qty} {tx.token}</span>
                    <span style={{color:G.textDim}}>${tx.price.toFixed(2)}</span>
                    <span style={{color:tx.type==="BUY"?G.redLight:G.green3,fontWeight:700}}>{tx.type==="BUY"?"-":"+"}${tx.total.toFixed(2)}</span>
                  </div>
                ))}
              </div>
            </div>
          ):(
            <div style={{textAlign:"center",padding:"40px 20px",color:G.textDim,fontSize:13}}>
              Aún no realizaste transacciones. <span style={{color:G.green3,cursor:"pointer"}} onClick={()=>setPage("market")}>Ir al Mercado →</span>
            </div>
          )}
        </div>
      )}

      <footer style={{borderTop:`1px solid ${G.border}`,padding:"20px 36px",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10,color:G.textDim,letterSpacing:1,position:"relative",zIndex:1,textTransform:"uppercase"}}>
        <span>🐄 PampaToken · Ganadería Digital Argentina · © 2025</span>
        <span>1 USD = ARS {ARS_RATE.toLocaleString("es-AR")} (ficticio) · No constituyen asesoramiento financiero</span>
      </footer>

      <div style={S.toast(toast.vis)}>{toast.msg}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PampaToken));
</script>
</body>
</html>
